# Scenario: Asymmetric Token Load
#
# What is being tested:
#   Programs with vastly different per-request costs (token sizes) competing
#   with a default queue of small requests. This tests whether the scoring
#   formula (wait time + queue depth) combined with reserved-slot dispatch
#   handles mixed workloads fairly.
#
# Expected results:
#   - program-aware phase: prog-heavy gets its fair share of dispatch turns
#     despite each request taking longer to complete. prog-light also gets
#     fair service. Default queue is capped at ~20%.
#   - baseline phase: the default queue (high rate, small requests) fills up
#     quickly and dominates scoring. prog-heavy suffers the most because its
#     requests take longer, causing its queue to grow while being starved.

name: asymmetric-token-load

model: meta-llama/Llama-3.1-8B-Instruct

infra:
  kind: true
  namespace: default
  vllm:
    extra_args: []

test:
  duration: 120
  warmup: 30
  concurrency: 50
  timeout: 90

programs:
  # Default queue: high rate, small requests.
  default-flow:
    count: 1
    rate: 8
    prompt_tokens: 100
    max_tokens: 50

  # Labeled program with large, expensive requests.
  prog-heavy:
    count: 1
    rate: 2
    prompt_tokens: 500
    max_tokens: 512

  # Labeled program with small, cheap requests.
  prog-light:
    count: 1
    rate: 5
    prompt_tokens: 100
    max_tokens: 50

phases:
  - name: baseline
    epp_config: configs/baseline.yaml
  - name: baseline-round-robin
    epp_config: configs/round-robin.yaml
  - name: program-aware
    epp_config: configs/program-aware.yaml