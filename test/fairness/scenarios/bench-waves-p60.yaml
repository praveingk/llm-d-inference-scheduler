#
# 10 background + 50 foreground programs in 4 waves.
# Background rate: 5.3 req/s each (53.0 total)
#   Wave 1 (t=120s, 12 progs, 450s): rate=2.65, 300/256 tokens
#   Wave 2 (t=240s, 12 progs, 330s): rate=3.18, 300/256 tokens
#   Wave 3 (t=360s, 13 progs, 210s): rate=3.71, 399/299 tokens
#   Wave 4 (t=480s, 13 progs, 90s): rate=4.24, 201/128 tokens
# Peak total rate: 226.31 req/s | Capacity: 165.47 req/s (max-num-seqs=256)
# Peak load: 136.77%
#

name: bench-waves-p60
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: false
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=256
    - --max-model-len=4096
test:
  duration: 600
  warmup: 60
  concurrency: 33
  timeout: 600
