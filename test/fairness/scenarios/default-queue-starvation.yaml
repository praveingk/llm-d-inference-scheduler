# Scenario: Default Queue Starvation Prevention
#
# What is being tested:
#   Heavy unlabeled (default-flow) traffic competing against labeled programs.
#   This is the core problem the reserved-slot dispatch was designed to solve.
#   Without the fix, the default queue's score inflates due to high queue depth
#   and wait time, causing it to win nearly every Pick() call and starve
#   labeled programs.
#
# Expected results:
#   - program-aware phase: labeled programs receive ~80% of dispatch capacity.
#     Default queue is capped at ~20% despite generating 5x more traffic.
#     Labeled programs should have stable, low latency.
#   - baseline phase: default queue dominates picks. Labeled programs experience
#     high latency and possible timeouts due to starvation.

name: default-queue-starvation

model: meta-llama/Llama-3.1-8B-Instruct

infra:
  kind: true
  namespace: default
  vllm:
    extra_args: []

test:
  duration: 120
  warmup: 30
  concurrency: 50
  timeout: 60

programs:
  # Unlabeled traffic — uses "default-flow" as fairness ID, which the GIE
  # framework treats as the default queue.
  default-flow:
    count: 5
    rate: 5
    prompt_tokens: 200
    max_tokens: 100

  # Three labeled programs at moderate rate.
  prog-alpha:
    count: 1
    rate: 2
    prompt_tokens: 200
    max_tokens: 100
  prog-beta:
    count: 1
    rate: 2
    prompt_tokens: 200
    max_tokens: 100
  prog-gamma:
    count: 1
    rate: 2
    prompt_tokens: 200
    max_tokens: 100

phases:
  - name: baseline
    epp_config: configs/baseline.yaml
  - name: baseline-round-robin
    epp_config: configs/round-robin.yaml
  - name: program-aware
    epp_config: configs/program-aware.yaml