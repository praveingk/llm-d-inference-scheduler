# Scenario: Many Small Labeled Programs vs Heavy Default
#
# What is being tested:
#   10 labeled programs each sending at low rate (1 req/s) compete against
#   a heavy default queue (15 req/s total). This validates that even many
#   small programs are not starved when the default queue has much higher
#   aggregate throughput.
#
# Expected results:
#   - program-aware phase: each labeled program gets fair service from pick #1
#     with no ramp-up delay. Default queue is limited to ~20% of picks.
#     All 10 labeled programs should show similar average latency.
#   - baseline phase: default queue dominates due to its larger queue depth
#     inflating its score. Small labeled programs see degraded latency.

name: many-small-programs

model: meta-llama/Llama-3.1-8B-Instruct

infra:
  kind: true
  namespace: default
  vllm:
    extra_args: []

test:
  duration: 120
  warmup: 30
  concurrency: 50
  timeout: 60

programs:
  # Heavy default queue traffic.
  default-flow:
    count: 3
    rate: 5
    prompt_tokens: 200
    max_tokens: 100

  # 10 labeled programs, each at low rate.
  prog-01:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-02:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-03:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-04:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-05:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-06:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-07:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-08:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-09:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100
  prog-10:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100

phases:
  - name: baseline
    epp_config: configs/baseline.yaml
  - name: baseline-round-robin
    epp_config: configs/round-robin.yaml
  - name: program-aware
    epp_config: configs/program-aware.yaml