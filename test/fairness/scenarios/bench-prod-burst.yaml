# Generated scenario: production
#
# 25 foreground programs across 3 phase(s).
# Capacity: 185.63 req/s (max-num-seqs=256)
#   Phase 1 (t=0-150s, 5 fg): light-med=0.6, medium-med=0.4 | default-flow: rate=5.0 prompt=300 max=256
#   Phase 2 (t=150-400s, 15 fg): heavy-fast=0.4, medium-fast=0.3, light-fast=0.3 | default-flow: rate=10.0 prompt=300 max=256
#   Phase 3 (t=400-600s, 5 fg): light-slow=0.5, medium-slow=0.3, light-med=0.2 | default-flow: rate=3.0 prompt=150 max=64
# Seed: 42 | Rates: fast=15.0 med=8.0 slow=2.0
#

name: bench-prod-p25
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: false
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=256
    - --max-model-len=4096
test:
  duration: 600
  warmup: 60
  concurrency: 50
  timeout: 600
