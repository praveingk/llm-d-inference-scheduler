name: uniform-fairness

model: meta-llama/Llama-3.1-8B-Instruct

# Infrastructure — read by run_test.sh only
infra:
  kind: true
  namespace: default
  vllm:
    extra_args: []

# Load generation — read by fairness_loadgen.py
test:
  duration: 180
  warmup: 30
  concurrency: 50
  timeout: 60

programs:
  prog-heavy:
    count: 1
    rate: 10
    prompt_tokens: 200
    max_tokens: 100
  prog-medium:
    count: 1
    rate: 3
    prompt_tokens: 200
    max_tokens: 100
  prog-light:
    count: 1
    rate: 1
    prompt_tokens: 200
    max_tokens: 100

phases:
  - name: baseline
    epp_config: configs/baseline.yaml
  - name: program-aware
    epp_config: configs/program-aware.yaml