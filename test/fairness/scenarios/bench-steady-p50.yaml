# Generated scenario: steady
#
# 50 identical background programs, uniform token profile.
# Rate per program: 2.65 req/s | Total: 132.5 req/s
# Capacity: 165.47 req/s (max-num-seqs=256) | Load: 80.07%
# Tokens: 300 prompt / 256 max | Request time: 1.55s
#

name: bench-steady-p50
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: false
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=256
    - --max-model-len=4096
test:
  duration: 600
  warmup: 60
  concurrency: 40
  timeout: 600
