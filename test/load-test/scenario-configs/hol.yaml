# Production-like workload mix with anonymous traffic.
# ~20% of programs send without fairness headers, merging into "default-flow".

profiles:
  heavy-aggressive:
    prompt_tokens: 15000
    max_tokens: 15000
    concurrency: 16
    total_requests: 320
    request_timeout: 120
  medium-normal:
    prompt_tokens: 1500
    max_tokens: 1500
    concurrency: 8
    total_requests: 160
    request_timeout: 60
  light-slow:
    prompt_tokens: 150
    max_tokens: 150
    concurrency: 4
    total_requests: 80
    request_timeout: 60
  anonymous-medium:
    prompt_tokens: 1500
    max_tokens: 1500
    concurrency: 8
    total_requests: 160
    request_timeout: 60
    no_fairness_header: true
  anonymous-light:
    prompt_tokens: 150
    max_tokens: 150
    concurrency: 4
    total_requests: 80
    request_timeout: 60
    no_fairness_header: true

scenario:
  name: production-mix
  model: meta-llama/Llama-3.1-8B-Instruct
  max_num_seqs: 64
  window: 0
  spread: 1
  total_programs: 20
  warmup:
    total_requests: 0
    concurrency: 4
    prompt_tokens: 128
    max_tokens: 64
  programs:
    - profile: heavy-aggressive
      ratio: 0.80
    - profile: light-slow
      ratio: 0.20