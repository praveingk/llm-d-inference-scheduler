# Token diversity test.
# Fairness question: Does DRR equalize GPU utilization when programs
# differ in token size but not concurrency?
#
# 3 heavy-token programs (600+512 tokens) vs 3 light-token programs
# (150+64 tokens). Same concurrency and request count.
# DRR should equalize token throughput; EWMA/RR equalize request count.

profiles:
  heavy-token:
    prompt_tokens: 600
    max_tokens: 512
    concurrency: 8
    total_requests: 200
    request_timeout: 120
  light-token:
    prompt_tokens: 150
    max_tokens: 64
    concurrency: 8
    total_requests: 200
    request_timeout: 60

scenario:
  name: token-diversity
  model: meta-llama/Llama-3.1-8B-Instruct
  max_num_seqs: 20
  window: 0
  spread: 0
  total_programs: 6
  programs:
    - profile: heavy-token
      ratio: 0.5
    - profile: light-token
      ratio: 0.5