# Starvation resistance test.
# Fairness question: Does the scheduler protect low-concurrency senders
# from being starved by high-concurrency senders?
#
# 1 aggressive (concurrency=30) vs 1 polite (concurrency=2), same tokens
# and request count. max_num_seqs=16 forces heavy queuing.

profiles:
  aggressive:
    prompt_tokens: 600
    max_tokens: 512
    concurrency: 30
    total_requests: 300
    request_timeout: 120
  polite:
    prompt_tokens: 600
    max_tokens: 512
    concurrency: 2
    total_requests: 300
    request_timeout: 120

scenario:
  name: starvation-test
  model: meta-llama/Llama-3.1-8B-Instruct
  max_num_seqs: 16
  window: 0
  spread: 0
  total_programs: 2
  programs:
    - profile: aggressive
      ratio: 0.5
    - profile: polite
      ratio: 0.5