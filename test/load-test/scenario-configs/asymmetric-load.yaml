# Asymmetric load test.
# Fairness question: Does a high-volume program monopolize resources,
# or do small programs get their fair share? How does anonymous
# (default-flow) traffic affect identified programs?
#
# 1 heavy program (500 requests, concurrency=20) vs 10 light programs
# (50 requests each, concurrency=4) vs 5 anonymous programs (100 requests
# each, concurrency=6, no fairness header — all merge into "default-flow").

profiles:
  heavy:
    prompt_tokens: 300
    max_tokens: 256
    concurrency: 20
    total_requests: 500
    request_timeout: 120
  light:
    prompt_tokens: 300
    max_tokens: 256
    concurrency: 4
    total_requests: 50
    request_timeout: 60
  anonymous:
    prompt_tokens: 300
    max_tokens: 256
    concurrency: 6
    total_requests: 100
    request_timeout: 60
    no_fairness_header: true

scenario:
  name: asymmetric-load
  model: meta-llama/Llama-3.1-8B-Instruct
  max_num_seqs: 32
  window: 10
  spread: 0.5
  total_programs: 16
  programs:
    - profile: heavy
      ratio: 0.06
    - profile: light
      ratio: 0.63
    - profile: anonymous
      ratio: 0.31