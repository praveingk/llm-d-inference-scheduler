apiVersion: inference.networking.x-k8s.io/v1alpha1
kind: EndpointPickerConfig
plugins:
- type: program-aware-fairness
  parameters:
    strategy: throughput
    weightHeadWait: 0.3
    weightAvgWait: 0.2
    weightAvgTokens: 0.5
    pickLogFile: /tmp/pick.jsonl
- type: queue-scorer
- type: max-score-picker
- type: single-profile-handler

featureGates:
- flowControl
- prepareDataPlugins

flowControl:
  defaultPriorityBand:
    fairnessPolicyRef: program-aware-fairness

schedulingProfiles:
- name: default
  plugins:
  - pluginRef: queue-scorer
  - pluginRef: max-score-picker

saturationDetector:                                                                                                            
  queueDepthThreshold: 2