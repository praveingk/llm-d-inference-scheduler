# Generated scenario: token-diversity
# Programs: 6  total_requests: 1200  max-num-seqs: 20
name: token-diversity
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: true
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=20
    - --max-model-len=4096
test:
  warmup:
    total_requests: 0
    concurrency: 4
    prompt_tokens: 128
    max_tokens: 64
programs:
  fg-light-token-000:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 150
    max_tokens: 64
    start_time: 0
    request_timeout: 60
    no_fairness_header: false
  fg-heavy-token-000:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 600
    max_tokens: 512
    start_time: 0
    request_timeout: 120
    no_fairness_header: false
  fg-heavy-token-001:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 600
    max_tokens: 512
    start_time: 0
    request_timeout: 120
    no_fairness_header: false
  fg-light-token-001:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 150
    max_tokens: 64
    start_time: 0
    request_timeout: 60
    no_fairness_header: false
  fg-heavy-token-002:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 600
    max_tokens: 512
    start_time: 0
    request_timeout: 120
    no_fairness_header: false
  fg-light-token-002:
    total_requests: 200
    concurrency: 8
    prompt_tokens: 150
    max_tokens: 64
    start_time: 0
    request_timeout: 60
    no_fairness_header: false
phases:
- name: program-aware
  epp_config: configs/program-aware.yaml
  metrics_subsystem: program_aware
- name: program-aware-drr
  epp_config: configs/program-aware-drr.yaml
  metrics_subsystem: program_aware
- name: round-robin
  epp_config: configs/round-robin.yaml
  metrics_subsystem: round_robin
