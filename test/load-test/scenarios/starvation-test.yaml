# Generated scenario: starvation-test
# Programs: 2  total_requests: 600  max-num-seqs: 16
name: starvation-test
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: true
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=16
    - --max-model-len=4096
test:
  warmup:
    total_requests: 0
    concurrency: 4
    prompt_tokens: 128
    max_tokens: 64
programs:
  fg-polite-000:
    total_requests: 300
    concurrency: 2
    prompt_tokens: 600
    max_tokens: 512
    start_time: 0
    request_timeout: 120
    no_fairness_header: false
  fg-aggressive-000:
    total_requests: 300
    concurrency: 30
    prompt_tokens: 600
    max_tokens: 512
    start_time: 0
    request_timeout: 120
    no_fairness_header: false
phases:
- name: program-aware-ewma
  epp_config: configs/program-aware.yaml
  metrics_subsystem: program_aware
- name: program-aware-drr
  epp_config: configs/program-aware-drr.yaml
  metrics_subsystem: program_aware
- name: round-robin
  epp_config: configs/round-robin.yaml
  metrics_subsystem: round_robin
