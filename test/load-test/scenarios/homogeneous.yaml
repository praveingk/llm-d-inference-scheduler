# Generated scenario: homogeneous
# Programs: 10  total_requests: 2000  max-num-seqs: 20
name: homogeneous
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: true
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
