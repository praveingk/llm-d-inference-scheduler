# Generated scenario: burst-arrivals
# Programs: 10  total_requests: 2000  max-num-seqs: 32
name: burst-arrivals
model: meta-llama/Llama-3.1-8B-Instruct
infra:
  kind: true
  namespace: default
  vllm:
    extra_args:
    - --latency-calculator=per-token
    - --prefill-overhead=6ms
    - --prefill-time-per-token=17us
    - --inter-token-latency=6ms
    - --inter-token-latency-std-dev=1ms
    - --max-num-seqs=32
    - --max-model-len=4096
